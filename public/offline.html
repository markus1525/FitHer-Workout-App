<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FitHer — You're Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #FFF0F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(233, 30, 99, 0.25);
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1A1A2E;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      font-size: 16px;
      color: #888;
      text-align: center;
      line-height: 1.5;
      max-width: 280px;
      margin-bottom: 40px;
    }

    .wifi-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.35;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      margin-bottom: 16px;
      text-align: center;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #1A1A2E;
      margin-bottom: 6px;
    }

    .card-body {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    .discord-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 30px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(88, 101, 242, 0.35);
      transition: opacity 0.15s;
    }

    .discord-btn:active { opacity: 0.85; }

    .discord-icon {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .retry-btn {
      display: block;
      background: #E91E63;
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      padding: 16px 28px;
      border-radius: 30px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(233, 30, 99, 0.30);
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .retry-btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <img
    class="icon"
    src="https://d2xsxph8kpxj0f.cloudfront.net/310519663523605261/3PvwNR8VybWQnjqXPU9foG/fither-icon-79aubkohDz4ENMLsKWHnyj.png"
    alt="FitHer"
  />

  <div class="wifi-icon">📵</div>

  <h1>You're Offline</h1>
  <p class="subtitle">
    No internet connection. Check your Wi-Fi or mobile data and try again.
  </p>

  <div class="card">
    <p class="card-title">Need help?</p>
    <p class="card-body">
      Join our community on Discord for support, tips, and workout motivation!
    </p>
  </div>

  <a class="discord-btn" href="https://discord.gg/dWPwCy4GEG" target="_blank" rel="noopener">
    <svg class="discord-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    Join FitHer on Discord
  </a>

  <button class="retry-btn" onclick="window.location.reload()">
    Try Again
  </button>
</body>
</html>
